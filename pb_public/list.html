<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>书籍列表 - 旧书阁</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="header">
  <div class="logo">旧书阁</div>
  <div class="nav">
    <a href="index.html">首页</a>
    <a href="list.html">书籍列表</a>
    <a href="publish.html">我要卖书</a>
    <a href="about.html">About</a>
  </div>
</div>

<div class="container" style="padding:30px">
  <h2>二手书列表</h2>
  <div id="bookList" style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:20px">
    <!-- JS渲染 -->
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.19.0/dist/pocketbase.umd.js"></script>
<script>
    const pb = new PocketBase('http://127.0.0.1:8090');

    async function loadBooks() {
        const list = await pb.collection('books').getFullList();
        const box = document.getElementById('bookList');
        box.innerHTML = '';

        list.forEach(book => {
            const item = document.createElement('div');
            item.style.padding = '16px';
            item.style.border = '1px solid #ddd';
            item.style.borderRadius = '8px';
            item.innerHTML = `
                <h3>${book.title}</h3>
                <p>作者：${book.author}</p>
                <p>价格：¥${book.price}</p>
                <a href="detail.html?id=${book.id}" style="color:#1a365d;">查看详情</a>
            `;
            box.appendChild(item);
        });
    }

    loadBooks();
</script>
</body>
</html>
<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.19.0/dist/pocketbase.umd.js"></script>
<script>
const pb = new PocketBase('http://127.0.0.1:8090');
window.onload = () => {
    if(pb.authStore.model){
        document.querySelector('.nav').innerHTML += `<a href="javascript:logout()">退出(${pb.authStore.model.email})</a>`;
    }else{
        document.querySelector('.nav').innerHTML += `<a href="login.html">登录/注册</a>`;
    }
}
async function logout(){
    pb.authStore.clear();
    alert('已退出');
    window.location.href='index.html';
}
</script>
